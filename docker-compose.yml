version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: supply-chain-risk-app
    container_name: supply_chain_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8000:80"
    depends_on:
      - db
    networks:
      - supply_chain_network

  db:
    image: mysql:8.0
    container_name: supply_chain_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-supply_chain_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - supply_chain_network

networks:
  supply_chain_network:
    driver: bridge

volumes:
  dbdata:
